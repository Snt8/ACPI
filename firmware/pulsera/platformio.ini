[env:esp32c3_arduino]
platform  = espressif32@6.9.0
framework = arduino
board     = esp32-c3-devkitm-1

build_flags =
    -Iinclude
; Habilita USB CDC sobre Serial para el ESP32-C3 Super Mini
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_ldf_mode = deep+

; NimBLE: biblioteca BLE de menor footprint de memoria para ESP32-C3
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.3

upload_protocol = esptool
upload_port     = COM7
monitor_port    = COM7
monitor_speed   = 115200
upload_speed    = 115200
monitor_flags   = --raw
monitor_dtr     = 0
monitor_rts     = 0