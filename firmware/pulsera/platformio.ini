
; PlatformIO configuration for pulsera (ESP32-C3 Super Mini)
; -----------------------------------------------------------
; Nota: ajusta `board` al identificador exacto de tu placa en PlatformIO.
; Puedes listar placas disponibles con: pio boards espressif32

[platformio]
default_envs = esp32c3_arduino

[env:esp32c3_arduino]
platform = espressif32
board = esp32-c3-devkitm-1    ; Cambia esto si tu Super Mini tiene otro ID en PlatformIO
framework = arduino
monitor_speed = 115200

; Flags útiles para depuración/optimización
build_flags =
; Define macros de configuración del proyecto aquí
    -DPROJECT_PULSERA

; Dependencias de librerías (añade las que necesites para tu acelerómetro/magnetómetro)
; Ejemplo (descomenta y ajusta a la librería que uses):
;lib_deps =
;    adafruit/Adafruit BusIO@^1.14.0
;    adafruit/Adafruit LSM6DS3@^1.0.0

; Particiones / tamaño de la flash (opcional, descomenta si necesitas una partición custom)
;board_build.partitions = default.csv

; Upload: normalmente PlatformIO selecciona el uploader correcto; si tienes problemas puedes
; especificar upload_protocol = esptool

; ---- Entorno alternativo: ESP-IDF (CMake) ---
; Si en el futuro quieres usar ESP-IDF (CMake) crea/activa este entorno
; y migra tu código a la API de ESP-IDF.
[env:esp32c3_espidf]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf
monitor_speed = 115200

; Comandos útiles (PowerShell):
; Compilar: pio run
; Subir:   pio run -t upload
; Monitor: pio device monitor

; Recomendación: empieza con el entorno Arduino para prototipar rápido, y si
; necesitas control fino del build o funcionalidades avanzadas del ESP32 usa
; el entorno espidf y migra progresivamente.

